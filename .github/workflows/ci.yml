name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
        # Also exercise the minimum supported Python (pyproject requires-python >= 3.10).
        include:
          - os: ubuntu-latest
            python-version: "3.10"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # PyQt5's offscreen platform plugin needs a few system libraries on Linux. Windows and
      # macOS ship everything the wheels need.
      - name: Install Qt offscreen system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Install the locked publication environment
        run: uv sync --frozen --all-extras --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type check scientific services
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: uv run mypy src/cmm/core src/cmm/features src/cmm/omics

      - name: Validate citation and audit locked dependencies
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: |
          uvx --from cffconvert==2.0.0 cffconvert --validate
          uv export --frozen --all-extras --no-emit-project -o "$RUNNER_TEMP/requirements-audit.txt"
          uvx --from pip-audit==2.10.1 pip-audit \
            -r "$RUNNER_TEMP/requirements-audit.txt" --disable-pip --require-hashes

      - name: Test with branch coverage (offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          uv run pytest -q -ra --strict-markers
          --durations=10
          --cov=cmm --cov-branch --cov-report=term-missing
          --cov-fail-under=80
