name: Release

# Build the distribution and publish it as a GitHub Release whenever a version tag is pushed:
#
#     git tag v0.3.0 && git push origin v0.3.0
#
# CMM is pure Python, so a single universal wheel (cmm-<version>-py3-none-any.whl) installs on
# Windows, macOS, and Linux. No PyPI account or secrets are required — the artifacts are
# attached to the GitHub Release and installed from there or directly from the repo:
#
#     pip install https://github.com/jyryu3161/CMM/releases/download/v0.3.0/cmm-0.3.0-py3-none-any.whl
#     pip install "cmm[desktop,design] @ https://github.com/jyryu3161/CMM/releases/download/v0.3.0/cmm-0.3.0-py3-none-any.whl"
#     pip install "git+https://github.com/jyryu3161/CMM.git@v0.3.0"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to create the release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install Qt offscreen system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Install and verify the locked publication environment
        run: |
          uv sync --frozen --all-extras
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src/cmm/core src/cmm/features src/cmm/omics
          uvx --from cffconvert==2.0.0 cffconvert --validate
          uv export --frozen --all-extras --no-emit-project -o "$RUNNER_TEMP/requirements-audit.txt"
          uvx --from pip-audit==2.10.1 pip-audit \
            -r "$RUNNER_TEMP/requirements-audit.txt" --disable-pip --require-hashes
          QT_QPA_PLATFORM=offscreen uv run pytest -q --strict-markers

      - name: Verify tag matches the package version
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          uv run python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected:
              raise SystemExit(f"tag {os.environ['RELEASE_TAG']!r} does not match {expected!r}")
          PY

      - name: Build sdist + wheel
        run: uv build

      - name: Verify the built distribution
        run: |
          uvx twine check dist/*
          uv venv /tmp/cmm-wheel
          uv pip install --python /tmp/cmm-wheel/bin/python dist/*.whl
          /tmp/cmm-wheel/bin/python -m cmm.cli --version

      - name: Publish GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
